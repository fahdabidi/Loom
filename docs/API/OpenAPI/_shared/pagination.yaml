components:
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum number of records to return.
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor.
  schemas:
    PageInfo:
      type: object
      required:
        - hasMore
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true

