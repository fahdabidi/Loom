openapi: 3.1.0
info:
  title: Loom Cross-Posting API
  version: 0.1.0
  summary: Publish announcements or content links from Loom out to a creator's linked external platforms, with per-target delivery status.
  description: >
    Backs the coexist-don't-abandon migration strategy (Product Doc 21 Workflow 4). A creator cross-posts
    a teaser, link, or announcement to the platforms that still feed them reach, driving their audience
    back to Loom. Delivery to external platforms is best-effort and per-target; in the demo it is simulated.
servers:
  - url: https://cross-posting.loom.example
security:
  - LoomUserOAuth:
      - creator.channel
  - LoomServiceAuth: []
x-loom-api-owner: creator/cross-posting
x-loom-source: GTM Launch Gap Analysis §B (re-acquisition family); Product Doc 21
x-loom-downstream-apis:
  - ./external-account-link-api.openapi.yaml
  - ./creator-announcement-api.openapi.yaml
paths:
  /v1/channels/{channelId}/cross-posts:
    get:
      operationId: listCrossPosts
      summary: List cross-posts for a channel.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Limit'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Cursor'
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cross-posts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCrossPostsResponse'
        '403':
          $ref: '../_shared/errors.yaml#/components/responses/Forbidden'
    post:
      operationId: createCrossPost
      summary: Create a cross-post to one or more linked external platforms.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCrossPostRequest'
      responses:
        '201':
          description: Cross-post created; per-target delivery is asynchronous.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrossPost'
        '400':
          $ref: '../_shared/errors.yaml#/components/responses/BadRequest'
  /v1/channels/{channelId}/cross-posts/{crossPostId}:
    get:
      operationId: getCrossPost
      summary: Read a cross-post and its per-target delivery status.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: channelId
          in: path
          required: true
          schema:
            type: string
        - name: crossPostId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cross-post.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrossPost'
        '404':
          $ref: '../_shared/errors.yaml#/components/responses/NotFound'
components:
  securitySchemes:
    LoomUserOAuth:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/LoomUserOAuth'
    LoomServiceAuth:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/LoomServiceAuth'
  schemas:
    CreateCrossPostRequest:
      type: object
      required:
        - targetLinkIds
        - message
      properties:
        targetLinkIds:
          type: array
          minItems: 1
          items:
            type: string
          description: Verified external account link ids to publish to.
        message:
          type: string
        announcementId:
          type: string
          nullable: true
          description: Optional rendered announcement to attach (from the Creator Announcement API).
        contentRef:
          $ref: '../_shared/components.yaml#/components/schemas/ResourceRef'
          nullable: true
        captureLinkUrl:
          type: string
          format: uri
          nullable: true
    CrossPostTarget:
      type: object
      required:
        - targetLinkId
        - platform
        - deliveryStatus
      properties:
        targetLinkId:
          type: string
        platform:
          type: string
        deliveryStatus:
          $ref: '../_shared/components.yaml#/components/schemas/JobStatus'
        externalPostUrl:
          type: string
          format: uri
          nullable: true
        message:
          type: string
          nullable: true
    CrossPost:
      type: object
      required:
        - crossPostId
        - channelId
        - targets
      properties:
        crossPostId:
          type: string
        channelId:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        targets:
          type: array
          items:
            $ref: '#/components/schemas/CrossPostTarget'
    ListCrossPostsResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CrossPost'
        page:
          $ref: '../_shared/pagination.yaml#/components/schemas/PageInfo'
