openapi: 3.1.0
info:
  title: Loom Fan Vault API
  version: 0.1.0
  summary: Fan-owned portable state, fan interest and dislike profile, private event storage, and scoped private memory bundles.
  description: Defines the owned API surface for core fan vault records, fan interests, disliked interests, liked/disliked creators, muted recommendation providers, private event vault records, preference export, and AI/private assistant memory bundles.
servers:
  - url: https://vault.loom.example
security:
  - LoomUserOAuth:
      - fan.vault
  - LoomServiceAuth: []
x-loom-api-owner: identity/fan-vault
x-loom-architecture-docs:
  - ../../../Architecture/03-identity-fan-data-wallets-and-fan-app-shell.md
x-loom-downstream-apis:
  - ./fan-passport-api.openapi.yaml
  - ../monetization/receipt-ledger-api.openapi.yaml
  - ../discovery/ai-gateway-api.openapi.yaml
  - ../discovery/recommendation-referral-api.openapi.yaml
  - ../discovery/external-content-source-api.openapi.yaml
paths:
  /v1/fan-vaults/{fanId}/records:
    get:
      operationId: listVaultRecords
      summary: List portable fan-owned records.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Limit'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Cursor'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: recordType
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Fan vault records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVaultRecordsResponse'
    post:
      operationId: upsertVaultRecord
      summary: Create or update a portable fan-owned vault record.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertVaultRecordRequest'
      responses:
        '200':
          description: Vault record stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecord'
  /v1/fan-vaults/{fanId}/private-events:
    post:
      operationId: appendPrivateEvent
      summary: Append a private event under purpose-bound controls.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendPrivateEventRequest'
      responses:
        '201':
          description: Private event appended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateEvent'
  /v1/fan-vaults/{fanId}/memory-bundles:
    post:
      operationId: createScopedMemoryBundle
      summary: Create a scoped private memory bundle for a single app, AI, or recommendation request.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemoryBundleRequest'
      responses:
        '201':
          description: Scoped memory bundle created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryBundle'
  /v1/fan-vaults/{fanId}/interest-profile:
    get:
      operationId: getFanInterestProfile
      summary: Read fan-owned interests, disliked interests, creator preferences, and muted providers.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fan interest profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanInterestProfile'
    put:
      operationId: updateFanInterestProfile
      summary: Replace or patch explicit fan interest and dislike controls.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFanInterestProfileRequest'
      responses:
        '200':
          description: Updated fan interest profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanInterestProfile'
  /v1/fan-vaults/{fanId}/interest-signals:
    post:
      operationId: appendFanInterestSignal
      summary: Append a fan interest, dislike, creator preference, muted provider, or feedback signal.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendFanInterestSignalRequest'
      responses:
        '201':
          description: Fan interest signal stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanInterestSignal'
  /v1/fan-vaults/{fanId}/ad-preferences:
    get:
      operationId: getFanAdPreferences
      summary: Read fan-owned ad preferences and creator ad data-sharing defaults.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fan ad preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanAdPreferences'
    put:
      operationId: updateFanAdPreferences
      summary: Replace or update fan-owned ad preferences.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFanAdPreferencesRequest'
      responses:
        '200':
          description: Updated fan ad preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanAdPreferences'
  /v1/fan-vaults/{fanId}/exports:
    post:
      operationId: exportFanVault
      summary: Export fan vault records for portability or data rights requests.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVaultExportRequest'
      responses:
        '202':
          description: Export job accepted.
          content:
            application/json:
              schema:
                $ref: '../_shared/components.yaml#/components/schemas/OperationStatus'
  /v1/fan-vaults/{fanId}/records/{recordId}:
    delete:
      operationId: deleteVaultRecord
      summary: Delete or tombstone a fan vault record.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Vault record deleted or tombstoned.
  /v1/fan-vaults/{fanId}/search-agent-config:
    get:
      operationId: getFanSearchAgentConfig
      summary: Read the fan's AI search agent connection + external-source settings.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fan AI search agent config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanSearchAgentConfig'
        '404':
          $ref: '../_shared/errors.yaml#/components/responses/NotFound'
    put:
      operationId: updateFanSearchAgentConfig
      summary: Connect/disconnect the fan's AI search agent (MCP) and external sources.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFanSearchAgentConfigRequest'
      responses:
        '200':
          description: Updated fan AI search agent config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanSearchAgentConfig'
components:
  securitySchemes:
    LoomUserOAuth:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/LoomUserOAuth'
    LoomServiceAuth:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/LoomServiceAuth'
  schemas:
    VaultRecord:
      type: object
      required:
        - recordId
        - fanId
        - recordType
        - data
        - updatedAt
      properties:
        recordId:
          type: string
        fanId:
          type: string
        recordType:
          type: string
          enum:
            - preference
            - bookmark
            - mute
            - app_setting
            - recommendation_preference
            - session_intent_preference
            - startup_tile_feedback
            - fan_interest_profile
            - interest_token
            - disliked_interest
            - disliked_creator
            - muted_recommendation_provider
            - fan_interest_signal
            - ad_preference
            - ai_memory
        data:
          type: object
          additionalProperties: true
        visibility:
          type: string
          enum:
            - fan_private
            - app_scoped
            - exportable
        updatedAt:
          type: string
          format: date-time
    UpsertVaultRecordRequest:
      type: object
      required:
        - recordType
        - data
      properties:
        recordId:
          type: string
        recordType:
          type: string
        data:
          type: object
          additionalProperties: true
        visibility:
          type: string
          enum:
            - fan_private
            - app_scoped
            - exportable
    AppendPrivateEventRequest:
      type: object
      required:
        - eventType
        - purpose
        - data
      properties:
        eventType:
          type: string
        purpose:
          type: string
        retention:
          type: string
          enum:
            - session
            - thirty_days
            - fan_controlled
        data:
          type: object
          additionalProperties: true
    PrivateEvent:
      type: object
      required:
        - eventId
        - fanId
        - eventType
        - purpose
        - occurredAt
      properties:
        eventId:
          type: string
        fanId:
          type: string
        eventType:
          type: string
        purpose:
          type: string
        occurredAt:
          type: string
          format: date-time
    CreateMemoryBundleRequest:
      type: object
      required:
        - purpose
        - requestedRecordTypes
        - expiresAt
      properties:
        purpose:
          type: string
        requestedRecordTypes:
          type: array
          items:
            type: string
        maxRecords:
          type: integer
          default: 25
        expiresAt:
          type: string
          format: date-time
    MemoryBundle:
      type: object
      required:
        - bundleId
        - fanId
        - purpose
        - records
        - expiresAt
      properties:
        bundleId:
          type: string
        fanId:
          type: string
        purpose:
          type: string
        records:
          type: array
          items:
            $ref: '#/components/schemas/VaultRecord'
        expiresAt:
          type: string
          format: date-time
    InterestToken:
      type: object
      required:
        - token
        - tokenType
      properties:
        token:
          type: string
          examples:
            - tennis
            - cricket
            - video_game_reviews
        tokenType:
          type: string
          enum:
            - topic
            - creator
            - format
            - product
            - sport
            - genre
            - community
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        source:
          type: string
          enum:
            - startup_selection
            - follow_graph
            - explicit_feedback
            - permitted_private_summary
            - app_default
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    DislikedInterestToken:
      type: object
      required:
        - token
        - tokenType
        - severity
      properties:
        token:
          type: string
        tokenType:
          type: string
          enum:
            - topic
            - creator
            - format
            - product
            - sport
            - genre
            - community
        severity:
          type: string
          enum:
            - reduce
            - suppress
            - exclude
        source:
          type: string
          enum:
            - fan_explicit
            - feedback
            - policy
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    CreatorPreferenceRecord:
      type: object
      required:
        - channelId
        - preference
      properties:
        channelId:
          type: string
        preference:
          type: string
          enum:
            - liked
            - followed
            - disliked
            - muted
            - blocked
        source:
          type: string
          enum:
            - follow_graph
            - explicit_feedback
            - app_control
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    MutedProviderRecord:
      type: object
      required:
        - providerId
        - providerType
      properties:
        providerId:
          type: string
        providerType:
          type: string
          enum:
            - recommendation_provider
            - hosting_provider
            - app
        reason:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    FanInterestProfile:
      type: object
      required:
        - fanId
        - interests
        - dislikedInterests
        - creatorPreferences
        - mutedProviders
        - updatedAt
      properties:
        fanId:
          type: string
        interests:
          type: array
          items:
            $ref: '#/components/schemas/InterestToken'
        dislikedInterests:
          type: array
          items:
            $ref: '#/components/schemas/DislikedInterestToken'
        creatorPreferences:
          type: array
          items:
            $ref: '#/components/schemas/CreatorPreferenceRecord'
        mutedProviders:
          type: array
          items:
            $ref: '#/components/schemas/MutedProviderRecord'
        derivedPrivateInterestSummaryAvailable:
          type: boolean
          default: false
        updatedAt:
          type: string
          format: date-time
    UpdateFanInterestProfileRequest:
      type: object
      properties:
        interests:
          type: array
          items:
            $ref: '#/components/schemas/InterestToken'
        dislikedInterests:
          type: array
          items:
            $ref: '#/components/schemas/DislikedInterestToken'
        creatorPreferences:
          type: array
          items:
            $ref: '#/components/schemas/CreatorPreferenceRecord'
        mutedProviders:
          type: array
          items:
            $ref: '#/components/schemas/MutedProviderRecord'
        writeMode:
          type: string
          default: merge
          enum:
            - merge
            - replace
    FanInterestSignalType:
      type: string
      enum:
        - startup_tile_selected
        - interest_liked
        - interest_disliked
        - content_liked
        - content_disliked
        - content_not_interested
        - content_flagged
        - creator_followed
        - creator_unfollowed
        - creator_disliked
        - creator_muted
        - provider_muted
    AppendFanInterestSignalRequest:
      type: object
      required:
        - signalType
      properties:
        signalType:
          $ref: '#/components/schemas/FanInterestSignalType'
        sessionIntentId:
          type: string
          nullable: true
        platformIntentId:
          type: string
          nullable: true
        targetId:
          type: string
          nullable: true
        targetType:
          type: string
          enum:
            - content
            - creator
            - provider
            - interest
            - startup_tile
          nullable: true
        interestTokens:
          type: array
          items:
            $ref: '#/components/schemas/InterestToken'
        dislikedInterests:
          type: array
          items:
            $ref: '#/components/schemas/DislikedInterestToken'
        sourceAppId:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
    FanInterestSignal:
      allOf:
        - $ref: '#/components/schemas/AppendFanInterestSignalRequest'
        - type: object
          required:
            - signalId
            - fanId
            - occurredAt
          properties:
            signalId:
              type: string
            fanId:
              type: string
            occurredAt:
              type: string
              format: date-time
    FanAdPreferences:
      type: object
      required:
        - fanId
        - creatorApprovedOnlyDefault
        - useInterestsForCreatorAdsDefault
        - updatedAt
      properties:
        fanId:
          type: string
        creatorApprovedOnlyDefault:
          type: boolean
          default: true
        useInterestsForCreatorAdsDefault:
          type: boolean
          default: false
        allowedAdCategories:
          type: array
          items:
            type: string
        blockedAdCategories:
          type: array
          items:
            type: string
        blockedSponsorIds:
          type: array
          items:
            type: string
        sensitiveAdCategoriesDenied:
          type: array
          items:
            type: string
        creatorDataGrantDefault:
          type: string
          enum:
            - ask_each_time
            - deny_by_default
            - use_category_policies
        updatedAt:
          type: string
          format: date-time
    UpdateFanAdPreferencesRequest:
      type: object
      properties:
        creatorApprovedOnlyDefault:
          type: boolean
        useInterestsForCreatorAdsDefault:
          type: boolean
        allowedAdCategories:
          type: array
          items:
            type: string
        blockedAdCategories:
          type: array
          items:
            type: string
        blockedSponsorIds:
          type: array
          items:
            type: string
        sensitiveAdCategoriesDenied:
          type: array
          items:
            type: string
        creatorDataGrantDefault:
          type: string
          enum:
            - ask_each_time
            - deny_by_default
            - use_category_policies
    CreateVaultExportRequest:
      type: object
      properties:
        includePrivateEvents:
          type: boolean
          default: false
        includeAiMemory:
          type: boolean
          default: true
        encryptionPublicKey:
          type: string
          nullable: true
    ExternalSourceConnection:
      type: object
      required:
        - sourceType
        - connected
      properties:
        sourceType:
          $ref: '../discovery/external-content-source-api.openapi.yaml#/components/schemas/ExternalSourceType'
        connected:
          type: boolean
        displayName:
          type: string
          nullable: true
    FanSearchAgentConfig:
      type: object
      required:
        - fanId
        - provider
        - connected
        - preferCreators
        - externalSourcesEnabled
        - updatedAt
      properties:
        fanId:
          type: string
        provider:
          type: string
          enum:
            - anthropic_claude
            - openai
            - google_gemini
            - custom
            - none
          default: none
        mcpEndpoint:
          type: string
          format: uri
          nullable: true
          description: The fan's MCP server endpoint for their agent (simulated in the demo).
        connected:
          type: boolean
          default: false
        preferCreators:
          type: boolean
          default: true
        externalSourcesEnabled:
          type: boolean
          default: false
        connectedSources:
          type: array
          items:
            $ref: '#/components/schemas/ExternalSourceConnection'
        queryEgressAcknowledged:
          type: boolean
          default: false
          description: Fan acknowledged that search queries are sent to their chosen AI provider (data egress).
        updatedAt:
          type: string
          format: date-time
    UpdateFanSearchAgentConfigRequest:
      type: object
      properties:
        provider:
          type: string
          enum:
            - anthropic_claude
            - openai
            - google_gemini
            - custom
            - none
        mcpEndpoint:
          type: string
          format: uri
          nullable: true
        connected:
          type: boolean
        preferCreators:
          type: boolean
        externalSourcesEnabled:
          type: boolean
        queryEgressAcknowledged:
          type: boolean
        connectedSources:
          type: array
          items:
            $ref: '#/components/schemas/ExternalSourceConnection'
    ListVaultRecordsResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VaultRecord'
        page:
          $ref: '../_shared/pagination.yaml#/components/schemas/PageInfo'
