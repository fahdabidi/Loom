openapi: 3.1.0
info:
  title: Loom Fan Passport API
  version: 0.1.0
  summary: Portable fan identity, follows, pairwise creator identity, and consent grants.
  description: Defines the owned API surface for Fan Passport creation, follow relationships, pairwise creator-scoped identity, app grants, campaign grants, creator interest-data grants, category-level creator permission policies, and relationship visibility controls.
servers:
  - url: https://identity.loom.example
security:
  - LoomUserOAuth:
      - fan.passport
  - LoomServiceAuth: []
x-loom-api-owner: identity/fan-passport
x-loom-architecture-docs:
  - ../../../Architecture/03-identity-fan-data-wallets-and-fan-app-shell.md
x-loom-downstream-apis:
  - ../creator/creator-audience-api.openapi.yaml
  - ../creator/creator-metadata-api.openapi.yaml
  - ../monetization/receipt-ledger-api.openapi.yaml
paths:
  /v1/fan-passports:
    post:
      operationId: createFanPassport
      summary: Create a portable fan passport.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFanPassportRequest'
      responses:
        '201':
          description: Fan passport created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanPassport'
        '400':
          $ref: '../_shared/errors.yaml#/components/responses/BadRequest'
  /v1/fan-passports/{fanId}:
    get:
      operationId: getFanPassport
      summary: Read a fan passport.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fan passport.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FanPassport'
        '404':
          $ref: '../_shared/errors.yaml#/components/responses/NotFound'
  /v1/fan-passports/{fanId}/follows:
    get:
      operationId: listFollows
      summary: List creator follow relationships for a fan.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Limit'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Cursor'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Follow relationships.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFollowsResponse'
    post:
      operationId: followCreator
      summary: Follow a creator with relationship visibility controls.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowCreatorRequest'
      responses:
        '201':
          description: Follow relationship created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowRelationship'
        '403':
          $ref: '../_shared/errors.yaml#/components/responses/Forbidden'
  /v1/fan-passports/{fanId}/follows/{channelId}:
    patch:
      operationId: updateFollowVisibility
      summary: Update relationship visibility or revocation state.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFollowVisibilityRequest'
      responses:
        '200':
          description: Follow visibility updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowRelationship'
    delete:
      operationId: unfollowCreator
      summary: Unfollow a creator and revoke relationship visibility.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Follow relationship removed.
  /v1/fan-passports/{fanId}/pairwise-identities/{channelId}:
    get:
      operationId: getPairwiseCreatorIdentity
      summary: Resolve a creator-scoped fan identifier.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pairwise identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairwiseCreatorIdentity'
  /v1/fan-passports/{fanId}/grants:
    get:
      operationId: listConsentGrants
      summary: List app, campaign, creator interest-data, AI, provider, and direct-contact grants.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Limit'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Cursor'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consent grants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListConsentGrantsResponse'
    post:
      operationId: createConsentGrant
      summary: Create a purpose-bound consent grant.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentGrantRequest'
      responses:
        '201':
          description: Consent grant created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentGrant'
  /v1/fan-passports/{fanId}/grants/{grantId}:
    delete:
      operationId: revokeConsentGrant
      summary: Revoke a consent grant.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: grantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Consent grant revoked.
  /v1/fan-passports/{fanId}/creator-data-grant-requests:
    get:
      operationId: listCreatorDataGrantRequests
      summary: List pending or resolved creator requests for fan interest, like, dislike, and ad-preference access.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Limit'
        - $ref: '../_shared/pagination.yaml#/components/parameters/Cursor'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum:
              - pending
              - approved
              - denied
              - expired
      responses:
        '200':
          description: Creator data grant requests visible to the fan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCreatorDataGrantRequestsResponse'
  /v1/fan-passports/{fanId}/creator-data-grant-requests/{requestId}/decision:
    post:
      operationId: decideCreatorDataGrantRequest
      summary: Approve, narrow, deny, or apply a category rule to a creator data grant request.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideCreatorDataGrantRequest'
      responses:
        '200':
          description: Creator data grant decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatorDataGrantDecision'
  /v1/fan-passports/{fanId}/creator-category-permission-policies:
    get:
      operationId: listCreatorCategoryPermissionPolicies
      summary: List fan defaults for creator-category data access requests.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Creator category permission policies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCreatorCategoryPermissionPoliciesResponse'
    put:
      operationId: updateCreatorCategoryPermissionPolicies
      summary: Replace fan defaults for creator-category data access requests.
      parameters:
        - $ref: '../_shared/components.yaml#/components/parameters/CorrelationId'
        - $ref: '../_shared/components.yaml#/components/parameters/IdempotencyKey'
        - name: fanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCreatorCategoryPermissionPoliciesRequest'
      responses:
        '200':
          description: Updated creator category permission policies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCreatorCategoryPermissionPoliciesResponse'
components:
  securitySchemes:
    LoomUserOAuth:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/LoomUserOAuth'
    LoomServiceAuth:
      $ref: '../_shared/security-schemes.yaml#/components/securitySchemes/LoomServiceAuth'
  schemas:
    CreateFanPassportRequest:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string
        defaultPrivacyMode:
          $ref: '#/components/schemas/FanPrivacyMode'
        publicKey:
          type: string
    FanPassport:
      type: object
      required:
        - fanId
        - displayName
        - privacyMode
        - createdAt
      properties:
        fanId:
          type: string
        displayName:
          type: string
        privacyMode:
          $ref: '#/components/schemas/FanPrivacyMode'
        publicKey:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    FanPrivacyMode:
      type: string
      enum:
        - free_personalized
        - premium_no_ads
        - premium_private
    FollowVisibility:
      type: string
      enum:
        - public
        - creator_visible
        - pseudonymous
        - private
    FollowCreatorRequest:
      type: object
      required:
        - channelId
        - visibility
      properties:
        channelId:
          type: string
        visibility:
          $ref: '#/components/schemas/FollowVisibility'
        directContactAllowed:
          type: boolean
          default: false
    UpdateFollowVisibilityRequest:
      type: object
      properties:
        visibility:
          $ref: '#/components/schemas/FollowVisibility'
        directContactAllowed:
          type: boolean
        revoked:
          type: boolean
          default: false
    FollowRelationship:
      type: object
      required:
        - fanId
        - channelId
        - pairwiseCreatorFanId
        - visibility
        - state
      properties:
        fanId:
          type: string
        channelId:
          type: string
        pairwiseCreatorFanId:
          type: string
        visibility:
          $ref: '#/components/schemas/FollowVisibility'
        directContactAllowed:
          type: boolean
        state:
          type: string
          enum:
            - active
            - revoked
            - blocked
        updatedAt:
          type: string
          format: date-time
    PairwiseCreatorIdentity:
      type: object
      required:
        - fanId
        - channelId
        - pairwiseCreatorFanId
      properties:
        fanId:
          type: string
        channelId:
          type: string
        pairwiseCreatorFanId:
          type: string
        visibility:
          $ref: '#/components/schemas/FollowVisibility'
    ConsentGrantType:
      type: string
      enum:
        - app
        - campaign
        - creator_interest_data
        - ai
        - provider
        - direct_contact
    ConsentGrantGranteeType:
      type: string
      enum:
        - app
        - campaign
        - creator_channel
        - creator_category
        - ai_provider
        - provider
        - sponsor
    FanDataField:
      type: string
      enum:
        - explicit_interests
        - inferred_interests
        - liked_content
        - disliked_content
        - liked_creators
        - disliked_creators
        - muted_creators
        - muted_providers
        - ad_preferences
        - follow_state
        - campaign_participation
        - direct_contact
        - aggregate_segments
    DataGrantOffer:
      type: object
      properties:
        offerId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        rewardDescription:
          type: string
          nullable: true
        rewardRef:
          $ref: '../_shared/components.yaml#/components/schemas/ResourceRef'
          nullable: true
        alternateEntryAvailable:
          type: boolean
          default: false
        valueDisclosure:
          type: string
          nullable: true
    CreateConsentGrantRequest:
      type: object
      required:
        - grantType
        - granteeId
        - purpose
        - fields
      properties:
        grantType:
          $ref: '#/components/schemas/ConsentGrantType'
        granteeType:
          $ref: '#/components/schemas/ConsentGrantGranteeType'
          nullable: true
        granteeId:
          type: string
        purpose:
          type: string
        fields:
          type: array
          items:
            type: string
        fanDataFields:
          type: array
          description: Typed fan data fields for creator interest-data grants. Generic app/campaign grants can continue to use fields.
          items:
            $ref: '#/components/schemas/FanDataField'
        creatorCategoryIds:
          type: array
          items:
            type: string
        adUseAllowed:
          type: boolean
          default: false
        sharingMode:
          type: string
          default: creator_scoped
          enum:
            - creator_scoped
            - creator_category_default
            - campaign_scoped
            - aggregate_only
        requestId:
          type: string
          nullable: true
        offer:
          $ref: '#/components/schemas/DataGrantOffer'
          nullable: true
        retentionDays:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
    ConsentGrant:
      type: object
      required:
        - grantId
        - fanId
        - grantType
        - granteeId
        - purpose
        - fields
        - state
      properties:
        grantId:
          type: string
        fanId:
          type: string
        grantType:
          $ref: '#/components/schemas/ConsentGrantType'
        granteeType:
          $ref: '#/components/schemas/ConsentGrantGranteeType'
          nullable: true
        granteeId:
          type: string
        purpose:
          type: string
        fields:
          type: array
          items:
            type: string
        fanDataFields:
          type: array
          description: Typed fan data fields for creator interest-data grants. Generic app/campaign grants can continue to use fields.
          items:
            $ref: '#/components/schemas/FanDataField'
        creatorCategoryIds:
          type: array
          items:
            type: string
        adUseAllowed:
          type: boolean
          default: false
        sharingMode:
          type: string
          enum:
            - creator_scoped
            - creator_category_default
            - campaign_scoped
            - aggregate_only
        requestId:
          type: string
          nullable: true
        offer:
          $ref: '#/components/schemas/DataGrantOffer'
          nullable: true
        retentionDays:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
        state:
          type: string
          enum:
            - active
            - revoked
            - expired
        expiresAt:
          type: string
          format: date-time
          nullable: true
    CreatorDataGrantRequest:
      type: object
      required:
        - requestId
        - requestingChannelId
        - purpose
        - fields
        - state
        - createdAt
      properties:
        requestId:
          type: string
        requestingChannelId:
          type: string
        creatorCategoryIds:
          type: array
          items:
            type: string
        purpose:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FanDataField'
        adUseRequested:
          type: boolean
          default: false
        retentionDays:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
        offer:
          $ref: '#/components/schemas/DataGrantOffer'
          nullable: true
        state:
          type: string
          enum:
            - pending
            - approved
            - denied
            - expired
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
    DecideCreatorDataGrantRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - approve
            - deny
            - narrow
        approvedFields:
          type: array
          items:
            $ref: '#/components/schemas/FanDataField'
        adUseAllowed:
          type: boolean
          default: false
        retentionDays:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        applyAsCategoryPolicy:
          type: boolean
          default: false
        creatorCategoryIds:
          type: array
          items:
            type: string
    CreatorDataGrantDecision:
      type: object
      required:
        - requestId
        - decision
      properties:
        requestId:
          type: string
        decision:
          type: string
          enum:
            - approved
            - denied
            - narrowed
        consentGrant:
          $ref: '#/components/schemas/ConsentGrant'
          nullable: true
        categoryPolicies:
          type: array
          items:
            $ref: '#/components/schemas/CreatorCategoryPermissionPolicy'
    CreatorCategoryPermissionPolicy:
      type: object
      required:
        - policyId
        - creatorCategoryId
        - defaultDecision
        - updatedAt
      properties:
        policyId:
          type: string
        creatorCategoryId:
          type: string
        creatorCategoryLabel:
          type: string
          nullable: true
        defaultDecision:
          type: string
          enum:
            - ask_each_time
            - auto_approve
            - auto_deny
        approvedFields:
          type: array
          items:
            $ref: '#/components/schemas/FanDataField'
        adUseAllowed:
          type: boolean
          default: false
        maxRetentionDays:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
        updatedAt:
          type: string
          format: date-time
    ListFollowsResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FollowRelationship'
        page:
          $ref: '../_shared/pagination.yaml#/components/schemas/PageInfo'
    ListConsentGrantsResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConsentGrant'
        page:
          $ref: '../_shared/pagination.yaml#/components/schemas/PageInfo'
    ListCreatorDataGrantRequestsResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreatorDataGrantRequest'
        page:
          $ref: '../_shared/pagination.yaml#/components/schemas/PageInfo'
    UpdateCreatorCategoryPermissionPoliciesRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreatorCategoryPermissionPolicy'
    ListCreatorCategoryPermissionPoliciesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreatorCategoryPermissionPolicy'
